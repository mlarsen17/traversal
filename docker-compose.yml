services:
  dagster_postgres:
    image: postgres:15-alpine
    container_name: dagster_postgres
    environment:
      POSTGRES_USER: ${DAGSTER_PG_USER}
      POSTGRES_PASSWORD: ${DAGSTER_PG_PASSWORD}
      POSTGRES_DB: ${DAGSTER_PG_DB}
    ports:
      - "5432:5432"
    volumes:
      - dagster_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DAGSTER_PG_USER} -d ${DAGSTER_PG_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  metadata_postgres:
    image: postgres:15-alpine
    container_name: metadata_postgres
    environment:
      POSTGRES_USER: ${METADATA_PG_USER}
      POSTGRES_PASSWORD: ${METADATA_PG_PASSWORD}
      POSTGRES_DB: ${METADATA_PG_DB}
    volumes:
      - metadata_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${METADATA_PG_USER} -d ${METADATA_PG_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redash_postgres:
    image: postgres:15-alpine
    container_name: redash_postgres
    environment:
      POSTGRES_USER: ${REDASH_PG_USER}
      POSTGRES_PASSWORD: ${REDASH_PG_PASSWORD}
      POSTGRES_DB: ${REDASH_PG_DB}
    volumes:
      - redash_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${REDASH_PG_USER} -d ${REDASH_PG_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redash_redis:
    image: redis:7-alpine
    container_name: redash_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    depends_on:
      dagster_postgres:
        condition: service_healthy
      metadata_postgres:
        condition: service_healthy
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./infra/pgadmin/servers.json:/pgadmin4/servers.json:ro

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio_init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    container_name: minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY_ID} ${S3_SECRET_ACCESS_KEY} &&
      mc mb --ignore-existing local/${S3_BUCKET} &&
      mc anonymous set none local/${S3_BUCKET}
      "
    restart: "no"

  migrations:
    build:
      context: .
      dockerfile: services/migrations/Dockerfile
    container_name: migrations
    env_file:
      - .env
    depends_on:
      metadata_postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  metadata_grants:
    image: postgres:15-alpine
    container_name: metadata_grants
    env_file:
      - .env
    depends_on:
      metadata_postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    volumes:
      - ./infra/postgres/grant_redash_reader.sh:/scripts/grant_redash_reader.sh:ro
    command: ["/bin/sh", "/scripts/grant_redash_reader.sh"]
    restart: "no"

  redash_init:
    image: redash/redash:10.1.0.b50633
    container_name: redash_init
    env_file:
      - .env
    depends_on:
      redash_postgres:
        condition: service_healthy
      redash_redis:
        condition: service_healthy
    environment:
      REDASH_DATABASE_URL: postgresql://${REDASH_PG_USER}:${REDASH_PG_PASSWORD}@redash_postgres:5432/${REDASH_PG_DB}
      REDASH_REDIS_URL: redis://redash_redis:6379/0
      REDASH_COOKIE_SECRET: ${REDASH_COOKIE_SECRET}
      REDASH_SECRET_KEY: ${REDASH_SECRET_KEY}
    command: ["create_db"]
    restart: "no"

  redash_server:
    image: redash/redash:10.1.0.b50633
    container_name: redash_server
    env_file:
      - .env
    depends_on:
      redash_postgres:
        condition: service_healthy
      redash_redis:
        condition: service_healthy
      redash_init:
        condition: service_completed_successfully
      metadata_grants:
        condition: service_completed_successfully
    ports:
      - "5000:5000"
    environment:
      REDASH_DATABASE_URL: postgresql://${REDASH_PG_USER}:${REDASH_PG_PASSWORD}@redash_postgres:5432/${REDASH_PG_DB}
      REDASH_REDIS_URL: redis://redash_redis:6379/0
      REDASH_COOKIE_SECRET: ${REDASH_COOKIE_SECRET}
      REDASH_SECRET_KEY: ${REDASH_SECRET_KEY}
    command: ["server"]

  redash_worker:
    image: redash/redash:10.1.0.b50633
    container_name: redash_worker
    env_file:
      - .env
    depends_on:
      redash_postgres:
        condition: service_healthy
      redash_redis:
        condition: service_healthy
      redash_init:
        condition: service_completed_successfully
    environment:
      REDASH_DATABASE_URL: postgresql://${REDASH_PG_USER}:${REDASH_PG_PASSWORD}@redash_postgres:5432/${REDASH_PG_DB}
      REDASH_REDIS_URL: redis://redash_redis:6379/0
      REDASH_COOKIE_SECRET: ${REDASH_COOKIE_SECRET}
      REDASH_SECRET_KEY: ${REDASH_SECRET_KEY}
    command: ["worker"]

  redash_scheduler:
    image: redash/redash:10.1.0.b50633
    container_name: redash_scheduler
    env_file:
      - .env
    depends_on:
      redash_postgres:
        condition: service_healthy
      redash_redis:
        condition: service_healthy
      redash_init:
        condition: service_completed_successfully
    environment:
      REDASH_DATABASE_URL: postgresql://${REDASH_PG_USER}:${REDASH_PG_PASSWORD}@redash_postgres:5432/${REDASH_PG_DB}
      REDASH_REDIS_URL: redis://redash_redis:6379/0
      REDASH_COOKIE_SECRET: ${REDASH_COOKIE_SECRET}
      REDASH_SECRET_KEY: ${REDASH_SECRET_KEY}
    command: ["scheduler"]

  dagster_webserver:
    build:
      context: .
      dockerfile: services/dagster/Dockerfile
    container_name: dagster_webserver
    env_file:
      - .env
    depends_on:
      dagster_postgres:
        condition: service_healthy
      metadata_postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio_init:
        condition: service_completed_successfully
      migrations:
        condition: service_completed_successfully
    volumes:
      - dagster_home:/opt/dagster/dagster_home
    ports:
      - "3000:3000"
    command:
      [
        "/bin/sh",
        "-c",
        "cp /opt/dagster/app/dagster.yaml /opt/dagster/dagster_home/dagster.yaml && exec dagster-webserver -h 0.0.0.0 -p 3000 -w /opt/dagster/app/workspace.yaml",
      ]

  dagster_daemon:
    build:
      context: .
      dockerfile: services/dagster/Dockerfile
    container_name: dagster_daemon
    env_file:
      - .env
    depends_on:
      dagster_postgres:
        condition: service_healthy
      metadata_postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio_init:
        condition: service_completed_successfully
      migrations:
        condition: service_completed_successfully
    volumes:
      - dagster_home:/opt/dagster/dagster_home
    command:
      [
        "/bin/sh",
        "-c",
        "cp /opt/dagster/app/dagster.yaml /opt/dagster/dagster_home/dagster.yaml && exec dagster-daemon run -w /opt/dagster/app/workspace.yaml",
      ]

volumes:
  dagster_pg_data:
  metadata_pg_data:
  redash_pg_data:
  pgadmin_data:
  minio_data:
  dagster_home:
